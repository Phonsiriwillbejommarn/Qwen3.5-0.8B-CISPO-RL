# CISPO Training Configuration
# MiniMaxAI CISPO for Qwen3.5-0.8B-Distillation-Phase2

# ─── Models ───────────────────────────────────────────────────────────────────
policy_model_name: "Phonsiri/Qwen3.5-0.8B-Distillation-Phase2"
judge_models: 
  - "Qwen/Qwen3.5-9B"
  - "google/gemma-4-E4B-it"
output_dir: "./outputs/cispo_run_002"
run_name: "cispo-qwen3.5-0.8b-rl-v2"

# ─── CISPO Algorithm ──────────────────────────────────────────────────────────
epsilon_high: 5.0          # Upper clip bound for IS weights (ε_high)
kl_coeff: 0.005            # เพิ่มจาก 0.002 เป็น 0.005 เพื่อดึงสติให้อยู่กับร่องกับรอย
group_size: 6              # Number of samples per prompt (G) — sync กับ RewardConfig.num_generations
temperature: 1.0           # Sampling temperature for rollouts
top_p: 0.95
top_k: 50

# ─── Reward Weights ───────────────────────────────────────────────────────────
reward_judge_weight: 1.0           # Weight for AI Judge reward
reward_length_weight: 0.4          # Bell curve + Safety Net weight
reward_think_rep_weight: 0.5       # หักหนักสำหรับ reasoning loop ใน <think>
reward_answer_rep_weight: 0.3      # หักคำตอบซ้ำ
reward_format_weight: 1.0          # บังคับ format <think>...</think>

# Dual repetition config
think_ngram_size: 16               # จับ loop ระดับ paragraph
think_rep_threshold: 0.12          # เข้มงวด (โมเดลนี้วน 7+ รอบ)
answer_ngram_size: 4               # จับคำซ้ำในคำตอบ
answer_rep_threshold: 0.10         # เข้มงวดมาก คำตอบต้องกระชับ

# Bell curve length config
min_think_tokens: 64               # คิดน้อยกว่านี้ถือว่าสั้นเกิน
optimal_think_tokens: 512          # zone ที่ให้ reward สูงสุด (+0.5)
max_think_tokens: 4096             # เส้นตาย Safety Net
max_response_tokens: 512           # Target max tokens for response section

# Ensemble + GRPO
ensemble_strategy: "weighted_min"  # 70% min + 30% avg (conservative)
group_normalize: true              # normalize reward ภายใน group
adv_clamp: 10.0                    # คุม magnitude ของ scaled advantage


# ─── Training ─────────────────────────────────────────────────────────────────
learning_rate: 5.0e-7          # ลด LR เพื่อให้โมเดลไม่ Overfit/Drift เร็วเกินไป
warmup_steps: 10
num_train_epochs: 3
max_steps: 1000              # Override epochs if set (set -1 to use epochs)
save_steps: 5                # พุชและเซฟทุก 5 steps ตามที่คุณขอ (บ่อยขึ้น)
eval_steps: 5
logging_steps: 1             # ดู log ทุก 1 step

# Batch sizes (H100 80GB — full precision)
per_device_train_batch_size: 1   # prompts per step (Cloud optimized)
gradient_accumulation_steps: 8   # effective batch = 8 prompts * G=6 = 48 responses
dataloader_num_workers: 4

# ─── Generation ───────────────────────────────────────────────────────────────
max_new_tokens: 8192           # Max tokens to generate per rollout (reasoning mode)
max_prompt_length: 512         # Max prompt tokens

# ─── Precision ────────────────────────────────────────────────────────────────
bf16: true                     # Use bfloat16 (H200 native)
tf32: true                     # Enable TF32 for matmul on Ampere/H100/H200
gradient_checkpointing: true   # Required for long-context with hybrid linear attention (Qwen3.5)

# ─── Dataset ──────────────────────────────────────────────────────────────────
# Options:
#   "nohurry/Opus-4.6-Reasoning-3000x-filtered" — Opus 4.6 reasoning (2326 rows) ← ใช้ตัวนี้
#   "openai/gsm8k"                               — Math reasoning (English)
#   "juletxara/thai_alpaca_52k"                  — Thai general QA
#   "custom"                                     — Load from local JSONL
dataset_name: "nohurry/Opus-4.6-Reasoning-3000x-filtered"
dataset_split: "train"
custom_data_path: null          # e.g., "./data/my_dataset.jsonl"
max_samples: null               # null = use all 2326 rows

# Text format — "opus_reasoning" | "gsm8k" | "alpaca" | "thai_multihop" | "raw"
dataset_format: "opus_reasoning"

# Mixed-mode thinking: สุ่มเปิด/ปิดโหมดคิดต่อ sample (ตาม SFT distribution)
# 0.8 = 80% เปิด Thinking, 20% ปิด (ตอบตรงแต่ Judge ยังให้คะแนนความลึก)
thinking_ratio: 0.8

# ─── Judge Model Config ───────────────────────────────────────────────────────
judge_max_new_tokens: 128
judge_temperature: 0.1
judge_batch_size: 1            # Reduced for stability with 8k tokens

# ─── Logging ──────────────────────────────────────────────────────────────────
use_wandb: true
wandb_project: "cispo-qwen3.5-rl"
report_to: "wandb"             # "wandb" | "tensorboard" | "none"

# ─── Checkpointing ────────────────────────────────────────────────────────────
save_total_limit: 3
load_best_model_at_end: false
resume_from_checkpoint: null   # path to checkpoint dir, or null

# ─── HuggingFace Hub ──────────────────────────────────────────────────────────
push_to_hub: true
hub_model_id: "Phonsiri/Qwen3.5-0.8B-CISPO-RL-v2"   # สร้าง repo ใหม่อัตโนมัติ (เริ่มใหม่ทั้งหมด)
hub_private: false                                     # true = private repo
hub_push_every_n_steps: 5        # push checkpoint ทุก 5 steps (ตามที่คุณขอ)
hub_push_optimizer: true         # push optimizer.pt ด้วย (เพื่อ resume)
hub_token: null                  # null = ใช้จาก HF_TOKEN env var หรือ huggingface-cli login

# ─── Advanced ─────────────────────────────────────────────────────────────────
seed: 42
deepspeed_config: null         # null for single GPU, or path to ds_config.json
fsdp: ""                       # Leave empty for single GPU
